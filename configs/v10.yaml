# Triangle Fill v10 - v9 plus mild local lattice shaping
# Key changes vs v9:
#   - add local lattice reward term (lattice-w: 0.10)
#   - num-envs: 512 -> 2048 (better GPU utilization)
#   - minibatch sizes scaled to match (8192 -> 32768)
#   - fast-collisions enabled (vectorized collision patch)
device: cuda
num-envs: 2048
n-agents: 30
max-episode-steps: 1000

rollout-steps: 512
total-updates: 4000

actor-hidden: 256
critic-hidden: 512

lr-actor: 3e-4
lr-critic: 3e-4
lr-end-factor: 0.1
gamma: 0.99
gae-lambda: 0.95
clip-coef: 0.2
update-epochs: 4
minibatch-size-policy: 32768
minibatch-size-value: 32768
value-clip: 0.2
max-grad-norm: 0.5

ent-coef: 0.02
ent-coef-end: 0.002
ent-decay-updates: 3000

per-agent-reward: true

formation-w: 2.0
spacing-w: 2.0
lattice-w: 0.10
lattice-k: 6
target-spacing-mm: 45.0
progress-reward: false
success-bonus: 0.0
success-threshold: 0.05
safe-collision-w: 0.5
safe-action-w: 0.0

formation-sinkhorn-tau: 0.001
formation-sinkhorn-iters: 30

amp: true
amp-dtype: bf16
torch-compile: true
fast-collisions: true
seed: 42

log-every: 10
save-every: 200
tensorboard: true
out-dir: runs/triangle_fill_v10
